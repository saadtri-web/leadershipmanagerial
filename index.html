<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master Leadership Managérial</title>
    <style>
      :root {
        --ink: #0f172a;
        --muted: #64748b;
        --line: #dbe4ef;
        --panel: #ffffff;
        --page: #f4f7fb;
        --sky: #075985;
        --sky-dark: #0c4a6e;
        --cyan: #0e7490;
        --emerald: #059669;
        --shadow: 0 16px 38px rgba(15, 23, 42, 0.09);
        --soft-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      button,
      input,
      textarea,
      select {
        font: inherit;
      }
      button {
        cursor: pointer;
      }
      .hero {
        position: relative;
        overflow: hidden;
        color: white;
        background:
          radial-gradient(circle at 82% 4%, rgba(255, 255, 255, 0.24), transparent 23%),
          radial-gradient(circle at 3% 95%, rgba(34, 211, 238, 0.22), transparent 27%),
          linear-gradient(135deg, #082f49 0%, #075985 58%, #0e7490 100%);
      }
      .hero-inner,
      .shell {
        width: min(1280px, calc(100% - 40px));
        margin: 0 auto;
      }
      .hero-inner {
        padding: 48px 0 42px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 420px;
        gap: 40px;
        align-items: center;
      }
      .brand-row {
        display: flex;
        gap: 16px;
        align-items: center;
        margin-bottom: 26px;
      }
      .logo-card {
        width: 96px;
        min-width: 96px;
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border-radius: 24px;
        color: #075985;
        background: #fff;
        box-shadow: 0 22px 45px rgba(8, 47, 73, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      .logo-mark {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        border: 3px solid #0e7490;
        font-weight: 950;
        line-height: 1;
        letter-spacing: 0;
      }
